name = "soil-bca-chat"
main = "src/index.js"
compatibility_date = "2024-11-01"

# The Gemini model. gemini-2.5-flash is the stable default.
[vars]
GEMINI_MODEL = "gemini-2.5-flash"
# Comma separated list of allowed site origins. Replace the first entry with
# the GitHub Pages origin where the BCA tool is hosted.
ALLOWED_ORIGINS = "https://drgenie.github.io,http://localhost:8000,http://127.0.0.1:8000"

# GEMINI_API_KEY is a SECRET, never put it here. Set it with:
#   npx wrangler secret put GEMINI_API_KEY
